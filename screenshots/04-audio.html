<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #F5F0EB; width: 1284px; height: 2778px; overflow: hidden; }
  .container { padding: 180px 100px 0; text-align: center; }
  .headline { font-size: 110px; font-weight: 900; line-height: 1.05; letter-spacing: -2px; color: #1A1A1A; margin-bottom: 40px; }
  .sub { font-size: 48px; font-weight: 500; color: #4A4A4A; line-height: 1.3; margin-bottom: 140px; }
  .player { background: white; border-radius: 70px; padding: 120px 60px; margin: 0 80px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); text-align: center; }
  .duration { color: #BE78F0; font-size: 32px; font-weight: 700; letter-spacing: 3px; margin-bottom: 20px; }
  .title { font-size: 72px; font-weight: 800; color: #1A1A1A; margin-bottom: 24px; }
  .by { font-size: 36px; color: #9B9590; margin-bottom: 100px; }
  .ring { width: 560px; height: 560px; border-radius: 280px; border: 20px solid #EDE8E3; border-top-color: #BE78F0; border-right-color: #BE78F0; transform: rotate(-45deg); margin: 0 auto; display: flex; align-items: center; justify-content: center; position: relative; }
  .time { position: absolute; transform: rotate(45deg); display: flex; flex-direction: column; align-items: center; }
  .time-now { font-size: 110px; font-weight: 800; color: #1A1A1A; }
  .time-total { font-size: 32px; color: #9B9590; margin-top: 12px; }
  .play { width: 200px; height: 200px; border-radius: 100px; background: #BE78F0; border: none; margin: 100px auto 0; display: flex; align-items: center; justify-content: center; }
  .play-icon { width: 0; height: 0; border-left: 60px solid white; border-top: 42px solid transparent; border-bottom: 42px solid transparent; margin-left: 16px; }
</style></head><body>
<div class="container">
  <div class="headline">Guided by<br/>neuroscience.</div>
  <div class="sub">NSDR, walking meditations,<br/>Huberman protocols.</div>
</div>
<div class="player">
  <div class="duration">10 MIN</div>
  <div class="title">NSDR</div>
  <div class="by">Dr. Andrew Huberman</div>
  <div class="ring"><div class="time"><div class="time-now">3:42</div><div class="time-total">/ 10:00</div></div></div>
  <div class="play"><div class="play-icon"></div></div>
</div>
</body></html>

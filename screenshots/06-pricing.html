<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #F5F0EB; width: 1284px; height: 2778px; overflow: hidden; }
  .container { padding: 240px 100px 0; text-align: center; }
  .headline { font-size: 130px; font-weight: 900; line-height: 1.05; letter-spacing: -3px; color: #1A1A1A; margin-bottom: 40px; }
  .sub { font-size: 52px; font-weight: 500; color: #4A4A4A; line-height: 1.3; margin-bottom: 140px; }
  .price-card { background: white; border-radius: 60px; padding: 120px 80px; margin: 0 80px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
  .badge { display: inline-block; background: #BE78F0; color: white; padding: 20px 44px; border-radius: 999px; font-size: 32px; font-weight: 700; letter-spacing: 2px; margin-bottom: 40px; }
  .price { font-size: 260px; font-weight: 900; color: #BE78F0; line-height: 1; letter-spacing: -10px; }
  .price-label { font-size: 42px; color: #9B9590; font-weight: 600; margin-top: 20px; margin-bottom: 100px; }
  .features { text-align: left; }
  .feat { display: flex; align-items: center; gap: 28px; padding: 32px 0; border-top: 1px solid #EDE8E3; font-size: 42px; color: #1A1A1A; font-weight: 500; }
  .check { width: 56px; height: 56px; border-radius: 28px; background: #BE78F0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .check svg { width: 36px; height: 36px; }
</style></head><body>
<div class="container">
  <div class="headline">$4.99.<br/>That's it.</div>
  <div class="sub">No subscriptions.<br/>Yours forever.</div>
</div>
<div class="price-card">
  <div class="badge">ONE-TIME</div>
  <div class="price">$4.99</div>
  <div class="price-label">Lifetime access</div>
  <div class="features">
    <div class="feat"><div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Unlimited focus sessions</div>
    <div class="feat"><div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Full Huberman protocols</div>
    <div class="feat"><div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Guided audio meditations</div>
    <div class="feat"><div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Adaptive AI progression</div>
  </div>
</div>
</body></html>

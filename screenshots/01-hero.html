<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, system-ui, sans-serif; background: linear-gradient(180deg, #BE78F0 0%, #9B5FD8 100%); width: 1284px; height: 2778px; overflow: hidden; position: relative; }
  .container { padding: 140px 100px 0; text-align: center; color: white; }
  .headline { font-size: 110px; font-weight: 900; line-height: 1.05; letter-spacing: -2px; margin-bottom: 40px; }
  .sub { font-size: 48px; font-weight: 500; opacity: 0.85; line-height: 1.3; margin-bottom: 100px; }
  .phone { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); width: 1000px; background: #F5F0EB; border-radius: 70px 70px 0 0; padding: 90px 60px 0; height: 1700px; box-shadow: 0 -40px 80px rgba(0,0,0,0.25); }
  .date-label { font-size: 28px; font-weight: 700; letter-spacing: 3px; color: #9B9590; margin-bottom: 6px; }
  .day-name { font-size: 78px; font-weight: 800; color: #1A1A1A; }
  .suggestion { background: #BE78F0; border-radius: 50px; padding: 60px; margin-top: 60px; }
  .sug-label { color: rgba(255,255,255,0.7); font-size: 24px; font-weight: 700; letter-spacing: 3px; margin-bottom: 12px; }
  .sug-title { color: white; font-size: 52px; font-weight: 800; margin-bottom: 12px; }
  .sug-sub { color: rgba(255,255,255,0.85); font-size: 30px; }
  .section-label { font-size: 24px; font-weight: 700; letter-spacing: 3px; color: #9B9590; margin: 70px 0 30px; }
  .card { background: white; border-radius: 50px; padding: 60px; box-shadow: 0 6px 30px rgba(0,0,0,0.05); }
  .card-duration { color: #BE78F0; font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-bottom: 16px; }
  .card-title { color: #1A1A1A; font-size: 56px; font-weight: 800; margin-bottom: 12px; }
  .card-sub { color: #9B9590; font-size: 32px; }
</style></head><body>
<div class="container">
  <div class="headline">Train your<br/>mind like<br/>a muscle.</div>
  <div class="sub">Build deep focus.<br/>Backed by neuroscience.</div>
</div>
<div class="phone">
  <div class="date-label">SUNDAY</div>
  <div class="day-name">Train</div>
  <div class="suggestion">
    <div class="sug-label">TODAY</div>
    <div class="sug-title">7-min Deep Focus</div>
    <div class="sug-sub">You're crushing it. Time to level up.</div>
  </div>
  <div class="section-label">ALL EXERCISES</div>
  <div class="card">
    <div class="card-duration">5 – 90 MIN</div>
    <div class="card-title">Deep Focus</div>
    <div class="card-sub">Train your attention with visual focus drills</div>
  </div>
</div>
</body></html>

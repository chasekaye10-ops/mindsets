<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #F5F0EB; width: 1284px; height: 2778px; overflow: hidden; }
  .container { padding: 220px 100px 0; text-align: center; }
  .headline { font-size: 110px; font-weight: 900; line-height: 1.05; letter-spacing: -2px; color: #1A1A1A; margin-bottom: 40px; }
  .sub { font-size: 48px; font-weight: 500; color: #4A4A4A; line-height: 1.3; margin-bottom: 180px; }
  .timer-screen { background: white; border-radius: 70px; padding: 140px 60px; margin: 0 80px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
  .active-label { font-size: 40px; color: #9B9590; margin-bottom: 80px; text-align: center; }
  .ring { width: 600px; height: 600px; border-radius: 300px; border: 20px solid #EDE8E3; border-top-color: #BE78F0; border-right-color: #BE78F0; transform: rotate(-45deg); margin: 0 auto; display: flex; align-items: center; justify-content: center; position: relative; }
  .time { position: absolute; transform: rotate(45deg); font-size: 160px; font-weight: 800; color: #1A1A1A; }
  .stop-btn { margin: 100px auto 0; display: block; padding: 28px 80px; border: 2px solid #E2DDD7; border-radius: 999px; font-size: 38px; color: #9B9590; background: white; }
</style></head><body>
<div class="container">
  <div class="headline">Hold your<br/>attention.</div>
  <div class="sub">From 5 minutes to 90.<br/>Adapts as you grow.</div>
</div>
<div class="timer-screen">
  <div class="active-label">Focus</div>
  <div class="ring"><div class="time">12:34</div></div>
  <button class="stop-btn">End Early</button>
</div>
</body></html>

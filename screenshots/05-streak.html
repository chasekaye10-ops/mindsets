<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, system-ui, sans-serif; background: linear-gradient(180deg, #BE78F0 0%, #9B5FD8 100%); width: 1284px; height: 2778px; overflow: hidden; }
  .container { padding: 220px 100px 0; text-align: center; color: white; }
  .headline { font-size: 130px; font-weight: 900; line-height: 1.05; letter-spacing: -2px; margin-bottom: 40px; }
  .sub { font-size: 52px; font-weight: 500; opacity: 0.85; line-height: 1.3; margin-bottom: 160px; }
  .streak-hero { text-align: center; margin-bottom: 160px; }
  .flame { width: 260px; height: 260px; margin: 0 auto 20px; }
  .streak-num { font-size: 320px; font-weight: 900; color: white; line-height: 1; letter-spacing: -12px; margin: 20px 0; }
  .streak-label { font-size: 48px; font-weight: 700; color: white; opacity: 0.9; letter-spacing: 4px; }
  .stats-row { display: flex; gap: 32px; padding: 0 100px; }
  .stat-card { flex: 1; background: white; border-radius: 50px; padding: 70px 40px; text-align: center; }
  .stat-label { font-size: 26px; font-weight: 700; letter-spacing: 2px; color: #9B9590; margin-bottom: 20px; }
  .stat-val { font-size: 96px; font-weight: 800; color: #BE78F0; }
</style></head><body>
<div class="container">
  <div class="headline">Build<br/>the habit.</div>
  <div class="sub">Daily reps. Real change.</div>
</div>
<div class="streak-hero">
  <svg class="flame" viewBox="0 0 24 24">
    <path fill="#FFB74D" d="M12 2C8 6 6 9 6 13c0 4 3 7 6 7s6-3 6-7c0-2-1-4-3-6 0 2-1 3-2 3-2 0-3-2-3-5 0-1 0-2 2-3z"/>
  </svg>
  <div class="streak-num">14</div>
  <div class="streak-label">DAY STREAK</div>
</div>
<div class="stats-row">
  <div class="stat-card"><div class="stat-label">SESSIONS</div><div class="stat-val">42</div></div>
  <div class="stat-card"><div class="stat-label">MINUTES</div><div class="stat-val">387</div></div>
</div>
</body></html>
